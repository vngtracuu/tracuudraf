<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Tra cứu chứng thư</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#f3f5f7;
      --card:#ffffff;
      --muted:#6b7280;
      --accent:#c53030;
      --border:#e6e9ee;
      --primary:#0f1724;
      --paper-width:900px;
    }
    html,body{height:100%;margin:0;background:var(--bg);font-family: "Helvetica Neue", Arial, sans-serif;color:var(--primary);}
    .wrap{max-width:var(--paper-width);margin:28px auto;padding:20px;}
    .search-bar{display:flex;gap:8px;align-items:center;margin-bottom:18px;}
    input[type="text"]{flex:0 0 360px;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:15px;}
    button{padding:10px 14px;border-radius:6px;border:0;background:#0b5cff;color:#fff;font-weight:600;cursor:pointer;}
    button:active{transform:translateY(1px);}

    /* Certificate card */
    .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:28px;box-shadow:0 6px 18px rgba(15,23,36,0.06);}
    .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
    .brand{display:flex;align-items:center;gap:12px;}
    .brand .logo{width:56px;height:56px;border-radius:6px;background:linear-gradient(135deg,#0b5cff,#6b8cff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;}
    .brand .company{font-size:14px;font-weight:700;color:#0b5cff;}
    .doc-title{text-align:center;margin:6px 0 18px;}
    .doc-title h1{margin:0;font-size:22px;letter-spacing:0.6px;}
    .doc-sub{color:var(--muted);font-size:13px;text-align:center;margin-top:6px;}

    .meta{display:flex;justify-content:space-between;gap:20px;margin-top:8px;}
    .meta .left, .meta .right{flex:1;}
    .meta .left .row, .meta .right .row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
    .label{min-width:140px;color:var(--muted);font-size:13px;}
    .value{font-weight:700;font-size:15px;color:var(--primary);}

    .result-box{background:#fff;border:1px solid var(--border);padding:14px;border-radius:8px;text-align:center;}
    .result-box .label{display:block;color:var(--muted);font-size:13px;margin-bottom:6px;}
    .result-box .amount{font-size:22px;color:var(--accent);font-weight:800;}

    /* Assets table */
    .assets{margin-top:20px;}
    .assets h3{margin:0 0 10px 0;font-size:16px;}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);}
    th,td{padding:12px 10px;border-bottom:1px solid #f1f3f6;text-align:left;font-size:14px;}
    th{background:#fafbfc;color:var(--muted);font-weight:700;}
    td.small{color:var(--muted);font-size:13px;}

    footer{margin-top:18px;color:var(--muted);font-size:13px;text-align:right;}

    /* Responsive */
    @media (max-width:760px){
      .meta{flex-direction:column;}
      .label{min-width:110px;}
      input[type="text"]{width:100%;}
      .wrap{padding:12px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="search-bar">
      <input id="maChungThu" type="text" placeholder="Nhập mã chứng thư, ví dụ: CTV26010081" />
      <button id="btnTraCuu">Tra cứu</button>
      <div style="margin-left:auto;color:var(--muted);font-size:13px;">VNG VALUE DRAF</div>
    </div>

    <div id="ketQua">
      <!-- Mặc định hiển thị hướng dẫn -->
      <div style="text-align:center;color:var(--muted);padding:40px 0;border:1px dashed var(--border);border-radius:8px;background:#fff;">
        Nhập mã chứng thư và bấm Tra cứu để xem chứng thư thẩm định tài sản
      </div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('btnTraCuu');
    const out = document.getElementById('ketQua');

    function formatCurrency(numStr) {
      const n = Number(String(numStr).replace(/[^0-9.-]+/g,""));
      if (Number.isNaN(n)) return numStr;
      return n.toLocaleString('vi-VN');
    }

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderCertificate(data) {
      // If your data.id is not the certificate code in image, you can map or override here.
      const code = escapeHtml(data.id || '');
      const date = escapeHtml(data.ngay || '');
      const name = escapeHtml(data.ten || '');
      const amount = formatCurrency(data.ketqua || '');
      const asset = escapeHtml(data.taisan || '');

      return `
        <div class="card">
          <div class="header-row">
            <div class="brand">
              <div class="logo">V</div>
              <div>
                <div class="company">VNG VALUE DRAF</div>
                <div style="font-size:12px;color:var(--muted);margin-top:2px;">Thẩm định giá tài sản</div>
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:12px;color:var(--muted);">Mã chứng thư</div>
              <div style="font-weight:800;font-size:15px;">${code}</div>
            </div>
          </div>

          <div class="doc-title">
            <h1>CHỨNG THƯ THẨM ĐỊNH TÀI SẢN</h1>
            <div class="doc-sub">Chứng thư thẩm định giá tài sản theo yêu cầu</div>
            <div class="doc-sub">(Đây là bản chưa chính thức)</div>
	              </div>

          <div class="meta">
            <div class="left">
              <div class="row"><div class="label">Mã chứng thư</div><div class="value">${code}</div></div>
              <div class="row"><div class="label">Ngày chứng thư</div><div class="value">${date}</div></div>
              <div class="row"><div class="label">Khách hàng</div><div class="value">${name}</div></div>
            </div>

            <div class="right">
              <div class="result-box">
                <div class="label">Kết quả thẩm định</div>
                <div class="amount">${amount} ₫</div>
              </div>
            </div>
          </div>

          <div class="assets">
            <h3>📋 Danh sách tài sản</h3>
            <table>
              <thead>
                <tr><th style="width:60px">STT</th><th>Hạng mục tài sản</th></tr>
              </thead>
              <tbody>
                <tr><td>1</td><td class="small">${asset}</td></tr>
              </tbody>
            </table>
          </div>

          <footer>© 2026 VNG VALUE DRAF</footer>
        </div>
      `;
    }

    btn.addEventListener('click', async () => {
      out.innerHTML = ''; // clear
      const id = document.getElementById('maChungThu').value.trim();
      if (!id) {
        out.innerHTML = '<p style="color:#b00020;">Vui lòng nhập mã chứng thư.</p>';
        return;
      }

      try {
        const resp = await fetch(`/api/docs/${encodeURIComponent(id)}`);
        if (resp.ok) {
          const data = await resp.json();
          out.innerHTML = renderCertificate(data);
        } else if (resp.status === 404) {
          out.innerHTML = '<div style="padding:18px;background:#fff;border:1px solid var(--border);border-radius:8px;color:#b00020;">Không tìm thấy chứng thư.</div>';
        } else {
          const err = await resp.json().catch(()=>null);
          out.innerHTML = `<div style="padding:18px;background:#fff;border:1px solid var(--border);border-radius:8px;color:#b00020;">Lỗi server: ${escapeHtml(err && err.error ? err.error : resp.statusText)}</div>`;
        }
      } catch (e) {
        out.innerHTML = `<div style="padding:18px;background:#fff;border:1px solid var(--border);border-radius:8px;color:#b00020;">Lỗi kết nối: ${escapeHtml(e.message)}</div>`;
      }
    });

    // Optional: allow Enter key to trigger search
    document.getElementById('maChungThu').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>

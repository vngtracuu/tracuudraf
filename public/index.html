<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Tra cứu chứng thư</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --muted:#6b7280;
      --accent-green:#0b8a00;
      --accent-blue:#0b5cff;
      --accent-red:#c53030;
      --border:#e6e9ee;
      --text:#0f1724;
      --max-width:920px;
      --radius:10px;
      --shadow: 0 10px 30px rgba(15,23,36,0.06);
      --label-w:120px;
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      font-family:Inter, "Helvetica Neue", Arial, sans-serif;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
    }

    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:28px 16px;
      box-sizing:border-box;
      gap:18px;
    }

    /* Top-left site brand (moved above search) */
    .site-brand-wrap{
      width:100%;
      max-width:var(--max-width);
      display:flex;
      align-items:flex-start;
      box-sizing:border-box;
    }
    .site-brand{
      font-weight:800;
      color:var(--accent-red);
      font-size:16px;
    }

    /* Search centered */
    .search-wrap{
      width:100%;
      max-width:var(--max-width);
      display:flex;
      justify-content:center;
      margin-bottom:0;
    }
    .search-card{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }
    .search-box{
      display:flex;
      gap:10px;
      align-items:center;
      background:transparent;
      padding:0;
      width:100%;
      justify-content:center;
    }
    input[type="text"]{
      width:420px;
      max-width:70%;
      padding:12px 14px;
      border:1px solid #e9eef6;
      border-radius:8px;
      font-size:15px;
      box-sizing:border-box;
    }
    input[type="text"]:focus{
      outline:none;
      box-shadow:0 6px 18px rgba(11,92,255,0.08);
      border-color:rgba(11,92,255,0.18);
    }
    .btn{
      padding:10px 14px;
      border-radius:8px;
      border:0;
      background:var(--accent-blue);
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    .btn.secondary{
      background:#fff;
      color:var(--accent-blue);
      border:1px solid rgba(11,92,255,0.12);
      font-weight:700;
    }

    /* Result container */
    .result-wrap{
      width:100%;
      max-width:var(--max-width);
      display:flex;
      justify-content:center;
      box-sizing:border-box;
    }
    .placeholder{
      width:100%;
      background:var(--card);
      border-radius:var(--radius);
      padding:40px;
      border:1px dashed var(--border);
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow);
    }

    /* Certificate card */
    .card{
      width:100%;
      background:var(--card);
      border-radius:var(--radius);
      padding:0;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      box-sizing:border-box;
      overflow:hidden;
    }

    /* Title area: left-aligned, gradient background, reduced height */
    .doc-title{
      background: linear-gradient(90deg, var(--accent-red) 0%, #ff8a00 100%);
      color:#fff;
      padding:10px 28px; /* reduced vertical padding to make height smaller */
      text-align:left;
    }
    .doc-title h1{
      margin:0;
      font-size:18px; /* slightly smaller to fit reduced height */
      letter-spacing:1px;
      font-weight:800;
      text-transform:uppercase;
      line-height:1.1;
    }
    .doc-sub{
      color:rgba(255,255,255,0.95);
      font-size:12px;
      margin-top:6px;
      opacity:0.95;
    }

    .card-body{
      padding:20px 28px 28px 28px;
    }

    /* Meta: first row with code/date/name inline (all same font size) */
    .meta{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:6px;
    }
    .meta-inline{
      display:flex;
      gap:24px;
      align-items:center;
      flex-wrap:wrap;
    }
    .meta-item{
      display:flex;
      gap:8px;
      align-items:center;
      min-width:160px;
    }
    .meta-item .label{
      color:var(--muted);
      font-size:14px; /* label size */
      min-width:90px;
      font-weight:600;
    }
    .meta-item .value{
      font-weight:700;
      font-size:16px; /* unified size for values */
      color:var(--text);
      text-transform:uppercase;
    }

    /* Result row below (label + value inline, no box) - same font size as other fields */
    .result-row{
      display:flex;
      gap:12px;
      align-items:center;
      margin-top:6px;
    }
    .result-row .label{
      color:var(--muted);
      font-size:14px;
      font-weight:600;
    }
    .result-row .value{
      font-weight:700;
      font-size:16px; /* unified size */
      color:var(--accent-green);
    }

    .assets{
      margin-top:20px;
    }
    .assets h3{
      margin:0 0 10px 0;
      font-size:16px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
      border:1px solid var(--border);
      border-radius:6px;
      overflow:hidden;
    }
    th,td{
      padding:12px 14px;
      border-bottom:1px solid #f1f3f6;
      text-align:left;
      font-size:14px;
      vertical-align:top;
    }
    th{
      background:#fafbfc;
      color:var(--muted);
      font-weight:700;
    }
    td.small{
      color:var(--muted);
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    footer{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
      padding-bottom:18px;
    }

    /* Responsive */
    @media (max-width:900px){
      input[type="text"]{width:320px;max-width:60%;}
      .meta-inline{gap:12px;}
      .result-row{justify-content:flex-start;}
    }
    @media (max-width:520px){
      input[type="text"]{width:100%;max-width:100%;}
      .search-wrap{padding:0 8px;}
      .meta-inline{flex-direction:column;gap:8px;align-items:flex-start;}
      .result-row{justify-content:flex-start;}
      .doc-title{padding:10px 18px;}
      .card-body{padding:16px 18px 18px 18px;}
    }

    /* Print friendly */
    @media print{
      body{background:#fff;}
      .search-wrap{display:none;}
      .card{box-shadow:none;border:0;padding:0;}
      .result-wrap{padding:0;}
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Top-left brand in red -->
    <div class="site-brand-wrap">
      <div class="site-brand">VNG VALUE</div>
    </div>

    <!-- Search centered -->
    <div class="search-wrap">
      <div class="search-card">
        <div class="search-box" role="search" aria-label="Tra cứu chứng thư">
          <input id="maChungThu" type="text" placeholder="Nhập mã chứng thư, ví dụ: CTV26010081" aria-label="Mã chứng thư" />
          <button id="btnTraCuu" class="btn" aria-label="Tra cứu">Tra cứu</button>
          <button id="btnBack" class="btn secondary" style="display:none;" aria-label="Quay lại">Quay Lại</button>
        </div>
      </div>
    </div>

    <!-- Result area -->
    <div class="result-wrap" id="ketQua">
      <div class="placeholder" id="placeholder">Nhập mã chứng thư và bấm <strong>Tra cứu</strong> để xem chứng thư thẩm định tài sản</div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('btnTraCuu');
    const btnBack = document.getElementById('btnBack');
    const out = document.getElementById('ketQua');
    const placeholder = document.getElementById('placeholder');
    const input = document.getElementById('maChungThu');

    function formatCurrency(numStr) {
      const n = Number(String(numStr).replace(/[^0-9.-]+/g,""));
      if (Number.isNaN(n)) return numStr;
      return n.toLocaleString('vi-VN');
    }

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showPlaceholder() {
      out.innerHTML = '';
      out.appendChild(placeholder);
      btnBack.style.display = 'none';
      input.focus();
    }

    function renderCertificate(data) {
      const code = escapeHtml(data.code || data.id || '');
      const date = escapeHtml(data.ngay || '');
      const name = escapeHtml((data.ten || '').toUpperCase());
      const amount = formatCurrency(data.ketqua || '');
      const asset = escapeHtml(data.taisan || '');

      return `
        <div class="card" role="region" aria-label="Chứng thư thẩm định tài sản">
          <div class="doc-title">
            <h1>CHỨNG THƯ THẨM ĐỊNH TÀI SẢN</h1>
            <div class="doc-sub">(Đây là bản chứng thư chưa chính thức)</div>
          </div>

          <div class="card-body">
            <div class="meta">
              <div class="meta-inline">
                <div class="meta-item">
                  <div class="label">Mã chứng thư</div>
                  <div class="value">${code}</div>
                </div>
                <div class="meta-item">
                  <div class="label">Ngày chứng thư</div>
                  <div class="value">${date}</div>
                </div>
                <div class="meta-item">
                  <div class="label">Khách hàng</div>
                  <div class="value">${name}</div>
                </div>
              </div>

              <div class="result-row" style="margin-top:12px;">
                <div class="label">Kết quả thẩm định</div>
                <div class="value">${amount} ₫</div>
              </div>
            </div>

            <div class="assets">
              <h3>📋 Danh sách tài sản</h3>
              <table>
                <thead>
                  <tr><th style="width:60px">STT</th><th>Hạng mục tài sản</th></tr>
                </thead>
                <tbody>
                  <tr><td>1</td><td class="small">${asset}</td></tr>
                </tbody>
              </table>
            </div>

            <footer>© 2026 VNG VALUE</footer>
          </div>
        </div>
      `;
    }

    btn.addEventListener('click', async () => {
      const id = input.value.trim();
      if (!id) {
        out.innerHTML = '<div class="card" style="padding:18px;color:#b00020;">Vui lòng nhập mã chứng thư.</div>';
        return;
      }

      out.innerHTML = '<div class="card" style="text-align:center;padding:28px;">Đang tải...</div>';
      try {
        const resp = await fetch(`/api/docs/${encodeURIComponent(id)}`);
        if (resp.ok) {
          const data = await resp.json();
          out.innerHTML = renderCertificate(data);
          btnBack.style.display = 'inline-block';
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (resp.status === 404) {
          out.innerHTML = '<div class="card" style="padding:18px;color:#b00020;">Không tìm thấy chứng thư.</div>';
          btnBack.style.display = 'inline-block';
        } else {
          const err = await resp.json().catch(()=>null);
          out.innerHTML = `<div class="card" style="padding:18px;color:#b00020;">Lỗi server: ${escapeHtml(err && err.error ? err.error : resp.statusText)}</div>`;
          btnBack.style.display = 'inline-block';
        }
      } catch (e) {
        out.innerHTML = `<div class="card" style="padding:18px;color:#b00020;">Lỗi kết nối: ${escapeHtml(e.message)}</div>`;
        btnBack.style.display = 'inline-block';
      }
    });

    btnBack.addEventListener('click', () => {
      input.value = '';
      showPlaceholder();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });

    // Initialize
    showPlaceholder();
  </script>
</body>
</html>

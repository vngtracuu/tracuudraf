<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tra cứu chứng thư</title>
</head>
<body>
  <h1>Tra cứu chứng thư thẩm định tài sản</h1>
  <input type="text" id="maChungThu" placeholder="Nhập mã chứng thư">
  <button onclick="traCuu()">Tra cứu</button>

  <div id="ketQua" style="margin-top:20px;"></div>

  <script>
    async function traCuu() {
      const id = document.getElementById('maChungThu').value.trim();
      if (!id) {
        alert("Vui lòng nhập mã chứng thư");
        return;
      }
      const res = await fetch(`/docs-page/${id}`);
      if (res.ok) {
        const html = await res.text();
        document.getElementById('ketQua').innerHTML = html;
      } else {
        document.getElementById('ketQua').innerHTML = "<p style='color:red;'>Không tìm thấy chứng thư</p>";
      }
    }
  </script>
</body>
</html>
